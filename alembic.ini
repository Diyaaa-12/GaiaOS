# alembic.ini — GaiaOS Alembic configuration
#
# Invocation from the project root:
#   alembic upgrade head
#   alembic downgrade base
#   alembic revision --autogenerate -m "describe your change"
#
# DATABASE_URL is read from the environment (or .env) by env.py at runtime.
# It is intentionally absent from sqlalchemy.url here so that no credentials
# are ever committed to version control.

[alembic]
# Path to the migrations package, relative to the project root (cwd when
# alembic is invoked).
script_location = data/migrations

# Filename format for auto-generated revision scripts.
# %(year)d%(month).2d%(day).2d_%(hour).2d%(minute).2d%(second).2d  — date-stamped
# Using a plain sequential prefix is enforced manually (0001_, 0002_, …)
# so that history is alphabetically ordered and human-readable.
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps in generated file headers.
timezone = UTC

# sys.path prepend — empty means Alembic inherits the caller's sys.path.
# PYTHONPATH=/app is set in Dockerfile and in docker-compose.yml, so all
# project modules (db, config, …) are importable without modification here.
prepend_sys_path = .

# Truncate the "slug" portion of auto-generated filenames at this length.
truncate_slug_length = 40

# Version path separator — default is os-dependent; explicit "os" is safest.
version_path_separator = os

# sqlalchemy.url is intentionally left unset.
# env.py reads DATABASE_URL from the environment via config.settings.
# Setting it here would require embedding a database credential, which
# contradicts the secrets-free-repo rule established in Milestone 1.

[post_write_hooks]
# No post-write hooks configured.  Add black/ruff formatting here if desired
# in a later milestone once the formatter is pinned in requirements/dev.txt.

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
