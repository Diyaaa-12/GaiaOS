name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements/dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Start PostgreSQL stack
        run: |
          # Use the local docker-compose setup to ensure exact parity with dev environment.
          # The override file exposes port 5432 to the GitHub Actions runner (localhost).
          cp docker-compose.override.yml.example docker-compose.override.yml
          docker compose up -d --wait postgres

      - name: Run Ruff
        run: ruff check .

      - name: Run Alembic Migrations
        env:
          DATABASE_URL: postgresql://gaiaos:gaiaos_dev_password@localhost:5432/gaiaos
        run: alembic upgrade head

      - name: Run Pytest
        env:
          DATABASE_URL: postgresql://gaiaos:gaiaos_dev_password@localhost:5432/gaiaos
        run: pytest
